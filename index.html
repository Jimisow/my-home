<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Home</title>
  <meta name="description" content="Gerez ensemble les courses, factures, rendez-vous et notes de votre foyer." />
  <meta name="theme-color" content="#4CAF50" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="app-header" class="app-header hidden">
    <div class="header-left">
      <span class="header-logo">🏠</span>
      <span class="header-title">My Home</span>
    </div>
    <nav id="main-nav" class="main-nav">
      <button data-page="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></button>
      <button data-page="courses"><span class="nav-icon">🛒</span><span class="nav-label">Courses</span></button>
      <button data-page="factures"><span class="nav-icon">💳</span><span class="nav-label">Factures</span></button>
      <button data-page="rendezvous"><span class="nav-icon">📅</span><span class="nav-label">RDV</span></button>
      <button data-page="notes"><span class="nav-icon">📝</span><span class="nav-label">Notes</span></button>
    </nav>
    <div id="user-menu-root"></div>
  </header>

  <main id="view-root"></main>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((err) => {
          console.warn("Enregistrement du service worker echoue :", err);
        });
      });
    }
  </script>
</body>
</html>
